name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run format:check

      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck

  test-unit:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Run unit tests
        run: npm run test
        env:
          NODE_ENV: test

  test-integration:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    env: &test_runtime_env
      NODE_ENV: test
      PG_HOST: localhost
      PG_PORT: 5432
      PG_NAME: short_url_test
      PG_USER: postgres
      PG_PWD: Pg!Strong123
      PG_SSL: false
      PG_POOL_MIN: 1
      PG_POOL_MAX: 5
      PG_IDLE_TIMEOUT_MS: 10000
      PG_CONNECTION_TIMEOUT_MS: 5000
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PWD: Redis!Strong123
      REDIS_DB: 1
      REDIS_TLS_ENABLED: false
      REDIS_CONNECT_TIMEOUT_MS: 5000
      CACHE_TTL_SECONDS: 60
      APP_PORT: 3001
      APP_HOST: localhost
      APP_GLOBAL_PREFIX: api
      APP_CORS_ORIGIN: '*'
      APP_BODY_LIMIT: 100kb
      APP_ENABLE_SWAGGER: false
      APP_HTTP_TIMEOUT_MS: 5000
      LOG_LEVEL: error
      LOG_PRETTY: false
      LOG_REDACT_SENSITIVE: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Pg!Strong123
          POSTGRES_DB: short_url
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d short_url"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        env:
          ALLOW_EMPTY_PASSWORD: 'no'
          REDIS_PWD: Redis!Strong123
        options: >-
          --health-cmd "redis-cli -a Redis!Strong123 ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Create test database
        run: |
          PGPASSWORD=Pg!Strong123 psql -h localhost -U postgres -d postgres -c "CREATE DATABASE short_url_test;" || true

      - name: Run integration tests
        run: npm run test:integration

  test-e2e:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    env: *test_runtime_env
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Pg!Strong123
          POSTGRES_DB: short_url
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d short_url"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        env:
          ALLOW_EMPTY_PASSWORD: 'no'
          REDIS_PWD: Redis!Strong123
        options: >-
          --health-cmd "redis-cli -a Redis!Strong123 ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Create test database
        run: |
          PGPASSWORD=Pg!Strong123 psql -h localhost -U postgres -d postgres -c "CREATE DATABASE short_url_test;" || true

      - name: Run e2e tests
        run: npm run test:e2e

  build:
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, test-e2e]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
