name: PR - Comentário Automático

on:
  pull_request:
    types: [opened, reopened]

jobs:
  pr-comment:
    name: Adicionar resumo dinâmico ao PR
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Obter lista de arquivos alterados
        id: changed-files
        run: |
          FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | head -20)
          # Formata como lista markdown
          FILES_MD=$(echo "$FILES" | sed 's/^/- `/' | sed 's/$/`/')
          # Salva como variável multiline
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES_MD" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Obter lista de commits
        id: commits
        run: |
          COMMITS=$(git log origin/${{ github.event.pull_request.base.ref }}...HEAD --pretty=format:"- %s (%an)" | head -10)
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comentar no PR com resumo dinâmico
        uses: actions/github-script@v7
        env:
          PR_CHANGED_FILES_MD: ${{ steps.changed-files.outputs.list }}
          PR_COMMITS_MD: ${{ steps.commits.outputs.list }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const changedFiles = process.env.PR_CHANGED_FILES_MD ?? '';
            const commits = process.env.PR_COMMITS_MD ?? '';

            const isDraft = pr.draft ? '🔴 Sim' : '🟢 Não';
            const isConflict = pr.mergeable === false ? '⚠️ Há conflitos!' : '✅ Sem conflitos';

            const body = [
              '## 🤖 Resumo automático do PR',
              '',
              '| Campo | Valor |',
              '|---|---|',
              `| **Autor** | @${pr.user.login} |`,
              `| **Branch** | \`${pr.head.ref}\` → \`${pr.base.ref}\` |`,
              `| **Commits** | ${pr.commits} |`,
              `| **Arquivos alterados** | ${pr.changed_files} |`,
              `| **Linhas adicionadas** | +${pr.additions} |`,
              `| **Linhas removidas** | -${pr.deletions} |`,
              `| **Rascunho** | ${isDraft} |`,
              '',
              '---',
              '',
              '### 📂 Arquivos modificados',
              changedFiles || '_Nenhum arquivo encontrado_',
              '',
              '---',
              '',
              '### 📝 Commits incluídos',
              commits || '_Nenhum commit encontrado_',
              '',
              '---',
              '',
              `> 💡 *Comentário gerado automaticamente pelo GitHub Actions em ${new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' })}*`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body
            });