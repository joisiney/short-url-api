name: PR - Resumo automático na descrição

on:
  pull_request:
    types: [opened, reopened]

jobs:
  pr-body-summary:
    name: Atualizar descrição do PR com resumo dinâmico
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Obter lista de arquivos alterados
        id: changed-files
        run: |
          FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | head -20)
          FILES_MD=$(echo "$FILES" | sed 's/^/- `/' | sed 's/$/`/')
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES_MD" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Obter lista de commits
        id: commits
        run: |
          COMMITS=$(git log origin/${{ github.event.pull_request.base.ref }}...HEAD --pretty=format:"- %s (%an)" | head -10)
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Inserir ou atualizar resumo no corpo do PR
        uses: actions/github-script@v7
        env:
          PR_CHANGED_FILES_MD: ${{ steps.changed-files.outputs.list }}
          PR_COMMITS_MD: ${{ steps.commits.outputs.list }}
        with:
          script: |
            const markerStart = '<!-- pr-auto-summary:start -->';
            const markerEnd = '<!-- pr-auto-summary:end -->';

            const pr = context.payload.pull_request;
            const changedFiles = process.env.PR_CHANGED_FILES_MD ?? '';
            const commitsList = process.env.PR_COMMITS_MD ?? '';

            const fmt = (v, fallback) =>
              v !== null && v !== undefined ? String(v) : fallback;

            const commitsCount = fmt(pr.commits, 'a calcular');
            const changedFilesCount = fmt(pr.changed_files, 'a calcular');
            const additions = pr.additions != null ? `+${pr.additions}` : 'a calcular';
            const deletions = pr.deletions != null ? `-${pr.deletions}` : 'a calcular';
            const isDraft = pr.draft ? 'Sim' : 'Não';

            const summaryLines = [
              '## Resumo automático do PR',
              '',
              '| Campo | Valor |',
              '|---|---|',
              `| **Autor** | @${pr.user.login} |`,
              `| **Branch** | \`${pr.head.ref}\` → \`${pr.base.ref}\` |`,
              `| **Commits** | ${commitsCount} |`,
              `| **Arquivos alterados** | ${changedFilesCount} |`,
              `| **Linhas adicionadas** | ${additions} |`,
              `| **Linhas removidas** | ${deletions} |`,
              `| **Rascunho** | ${isDraft} |`,
              '',
              '---',
              '',
              '### Arquivos modificados',
              changedFiles || '_Nenhum arquivo encontrado_',
              '',
              '---',
              '',
              '### Commits incluídos',
              commitsList || '_Nenhum commit encontrado_',
              '',
              '---',
              '',
              `> *Atualizado automaticamente pelo GitHub Actions em ${new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' })}.*`,
            ];

            const summaryMarkdown = summaryLines.join('\n');
            const autoBlock = `${markerStart}\n${summaryMarkdown}\n${markerEnd}`;

            const currentBody = pr.body ?? '';
            let newBody;

            const startIdx = currentBody.indexOf(markerStart);
            const endIdx = currentBody.indexOf(markerEnd);

            if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
              const before = currentBody.slice(0, startIdx);
              const after = currentBody.slice(endIdx + markerEnd.length);
              newBody = `${before}${autoBlock}${after}`;
            } else {
              const trimmed = currentBody.trim();
              newBody = trimmed
                ? `${autoBlock}\n\n---\n\n${trimmed}`
                : autoBlock;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: newBody.trimEnd(),
            });
