name: short-url

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: short-url-api
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - .env
    environment:
      PG_HOST: postgres
      REDIS_HOST: redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: short-url-postgres
    environment:
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PWD}
      - POSTGRES_DB=${PG_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: short-url-redis
    command: ["redis-server", "--requirepass", "${REDIS_PWD}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PWD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  create-test-db:
    image: postgres:16-alpine
    container_name: short-url-create-test-db
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${PG_USER}
      PGPASSWORD: ${PG_PWD}
    command: >
      sh -c "psql -d postgres -c \"SELECT 1 FROM pg_database WHERE datname = 'short_url_test'\" | grep -q 1
      || psql -d postgres -c \"CREATE DATABASE short_url_test\""
    restart: "no"

volumes:
  postgres_data:
